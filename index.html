<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hisaku DeckBuilder</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <h1 class="site-title">Hisaku DeckBuilder</h1>
      <nav class="nav">
        <button class="nav-btn active" data-page="deck">デッキシミュレーション</button>
        <button class="nav-btn" data-page="cards">カード情報登録</button>
        <button class="nav-btn" data-page="skills">スキル/奥義登録</button>
      </nav>
      <button class="hamburger" id="hamburger" aria-label="メニュー">
        <span></span><span></span><span></span>
      </button>
    </div>
    <nav class="nav-mobile" id="navMobile">
      <button class="nav-btn active" data-page="deck">デッキシミュレーション</button>
      <button class="nav-btn" data-page="cards">カード情報登録</button>
      <button class="nav-btn" data-page="skills">スキル/奥義登録</button>
    </nav>
  </header>

  <main class="main">
    <!-- デッキシミュレーション -->
    <section id="page-deck" class="page active">
      <h2>デッキシミュレーション</h2>
      <div class="deck-area">
        <div class="deck-slots">
          <h3>デッキ（5枚）</h3>
          <div class="deck-cards" id="deckCards">
            <div class="deck-slot empty" data-slot="0">スロット 1</div>
            <div class="deck-slot empty" data-slot="1">スロット 2</div>
            <div class="deck-slot empty" data-slot="2">スロット 3</div>
            <div class="deck-slot empty" data-slot="3">スロット 4</div>
            <div class="deck-slot empty" data-slot="4">スロット 5</div>
          </div>
          <div class="deck-stats" id="deckStats"></div>
          <div class="deck-skill-preview" id="deckSkillPreview"></div>
          <div class="deck-actions">
            <button class="btn btn-secondary" id="clearDeck">デッキをクリア</button>
          </div>
        </div>
        <div class="card-list-area">
          <h3>カード一覧</h3>
          <div class="filter-bar">
            <input type="text" id="filterText" placeholder="カード名・キャラクター名で検索" class="filter-input">
            <select id="filterRarity" class="filter-select">
              <option value="">レア度：全て</option>
              <option value="N">N</option>
              <option value="R">R</option>
              <option value="SR">SR</option>
              <option value="SSR">SSR</option>
            </select>
            <select id="filterAttribute" class="filter-select">
              <option value="">属性：全て</option>
              <option value="親愛">親愛</option>
              <option value="調教">調教</option>
              <option value="従順">従順</option>
            </select>
            <select id="filterWork" class="filter-select">
              <option value="">作品：全て</option>
            </select>
          </div>
          <div class="card-grid" id="cardGrid"></div>
        </div>
      </div>
    </section>

    <!-- カード情報登録 -->
    <section id="page-cards" class="page">
      <h2>カード情報登録</h2>
      <div class="split-layout">
        <div class="form-panel">
          <h3 id="cardFormTitle">新規カード登録</h3>
          <form id="cardForm" class="form">
            <input type="hidden" id="cardId">
            <div class="form-row">
              <label>カード名 <span class="required">*</span></label>
              <input type="text" id="cardName" required placeholder="カード名を入力">
            </div>
            <div class="form-row">
              <label>キャラクター名 <span class="required">*</span></label>
              <input type="text" id="charName" required placeholder="キャラクター名を入力">
            </div>
            <div class="form-row">
              <label>レア度 <span class="required">*</span></label>
              <div class="radio-group">
                <label class="radio-label"><input type="radio" name="rarity" value="N" required> N</label>
                <label class="radio-label"><input type="radio" name="rarity" value="R"> R</label>
                <label class="radio-label"><input type="radio" name="rarity" value="SR"> SR</label>
                <label class="radio-label"><input type="radio" name="rarity" value="SSR"> SSR</label>
              </div>
            </div>
            <div class="form-row">
              <label>作品</label>
              <div class="input-with-datalist">
                <input type="text" id="workName" placeholder="作品名を入力" list="workList" autocomplete="off">
                <datalist id="workList"></datalist>
              </div>
            </div>
            <div class="form-row">
              <label>属性 <span class="required">*</span></label>
              <div class="radio-group">
                <label class="radio-label"><input type="radio" name="attribute" value="親愛" required> 親愛</label>
                <label class="radio-label"><input type="radio" name="attribute" value="調教"> 調教</label>
                <label class="radio-label"><input type="radio" name="attribute" value="従順"> 従順</label>
              </div>
            </div>
            <div class="form-row">
              <label>脅迫力</label>
              <input type="number" id="power" min="0" placeholder="0">
            </div>
            <div class="form-row">
              <label>耐久力</label>
              <input type="number" id="hp" min="0" placeholder="0">
            </div>
            <div class="form-row">
              <label>スキル</label>
              <select id="cardSkill" class="form-select">
                <option value="">なし</option>
              </select>
            </div>
            <div class="form-row">
              <label>奥義</label>
              <select id="cardOugi" class="form-select">
                <option value="">なし</option>
              </select>
            </div>
            <div class="form-actions">
              <button type="submit" class="btn btn-primary" id="cardSubmitBtn">登録する</button>
              <button type="button" class="btn btn-secondary" id="cardCancelBtn" style="display:none">キャンセル</button>
            </div>
          </form>
        </div>
        <div class="list-panel">
          <h3>登録済みカード</h3>
          <div class="filter-bar">
            <input type="text" id="cardListFilter" placeholder="検索..." class="filter-input">
          </div>
          <div class="registered-list" id="cardList"></div>
        </div>
      </div>
    </section>

    <!-- スキル/奥義登録 -->
    <section id="page-skills" class="page">
      <h2>スキル / 奥義登録</h2>
      <div class="skills-layout">
        <!-- スキル登録 -->
        <div class="skill-section">
          <h3>スキル登録</h3>
          <div class="split-layout">
            <div class="form-panel">
              <h4 id="skillFormTitle">新規スキル登録</h4>
              <form id="skillForm" class="form">
                <input type="hidden" id="skillId">
                <div class="form-row">
                  <label>スキル名 <span class="required">*</span></label>
                  <input type="text" id="skillName" required placeholder="スキル名を入力">
                </div>
                <div class="form-row">
                  <label>効果説明</label>
                  <textarea id="skillEffect" rows="3" placeholder="効果を入力"></textarea>
                </div>
                <div class="form-row">
                  <label>発動条件（複数選択可）</label>
                  <div class="condition-builder" id="conditionBuilder">
                    <div class="condition-type-tabs">
                      <button type="button" class="cond-tab active" data-type="character">キャラクター名</button>
                      <button type="button" class="cond-tab" data-type="work">作品</button>
                      <button type="button" class="cond-tab" data-type="attribute">属性</button>
                    </div>
                    <div class="condition-input-area" id="conditionInputArea">
                      <div class="cond-panel active" data-type="character">
                        <div class="input-with-add">
                          <input type="text" id="condCharInput" placeholder="キャラクター名を入力" list="condCharList" autocomplete="off">
                          <datalist id="condCharList"></datalist>
                          <button type="button" class="btn btn-sm" id="addCondChar">追加</button>
                        </div>
                      </div>
                      <div class="cond-panel" data-type="work">
                        <div class="input-with-add">
                          <input type="text" id="condWorkInput" placeholder="作品名を入力" list="condWorkList" autocomplete="off">
                          <datalist id="condWorkList"></datalist>
                          <button type="button" class="btn btn-sm" id="addCondWork">追加</button>
                        </div>
                      </div>
                      <div class="cond-panel" data-type="attribute">
                        <div class="attr-checkboxes">
                          <label><input type="checkbox" class="cond-attr" value="親愛"> 親愛</label>
                          <label><input type="checkbox" class="cond-attr" value="調教"> 調教</label>
                          <label><input type="checkbox" class="cond-attr" value="従順"> 従順</label>
                        </div>
                      </div>
                    </div>
                    <div class="conditions-display" id="conditionsDisplay">
                      <span class="no-cond">条件なし（全カードに効果）</span>
                    </div>
                  </div>
                </div>
                <div class="form-actions">
                  <button type="submit" class="btn btn-primary">登録する</button>
                  <button type="button" class="btn btn-secondary" id="skillCancelBtn" style="display:none">キャンセル</button>
                </div>
              </form>
            </div>
            <div class="list-panel">
              <h4>登録済みスキル</h4>
              <div class="registered-list" id="skillList"></div>
            </div>
          </div>
        </div>

        <!-- 奥義登録 -->
        <div class="skill-section">
          <h3>奥義登録</h3>
          <div class="split-layout">
            <div class="form-panel">
              <h4 id="ougiFormTitle">新規奥義登録</h4>
              <form id="ougiForm" class="form">
                <input type="hidden" id="ougiId">
                <div class="form-row">
                  <label>奥義名 <span class="required">*</span></label>
                  <input type="text" id="ougiName" required placeholder="奥義名を入力">
                </div>
                <div class="form-row">
                  <label>説明</label>
                  <textarea id="ougiDesc" rows="2" placeholder="説明を入力（任意）"></textarea>
                </div>
                <div class="form-actions">
                  <button type="submit" class="btn btn-primary">登録する</button>
                  <button type="button" class="btn btn-secondary" id="ougiCancelBtn" style="display:none">キャンセル</button>
                </div>
              </form>
            </div>
            <div class="list-panel">
              <h4>登録済み奥義</h4>
              <div class="registered-list" id="ougiList"></div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- カード詳細モーダル -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="cardModal">
      <button class="modal-close" id="modalClose">&times;</button>
      <div class="modal-content" id="modalContent"></div>
    </div>
  </div>

  <!-- 削除確認モーダル -->
  <div class="modal-overlay" id="confirmOverlay">
    <div class="modal modal-sm" id="confirmModal">
      <p id="confirmMessage"></p>
      <div class="form-actions">
        <button class="btn btn-danger" id="confirmYes">削除する</button>
        <button class="btn btn-secondary" id="confirmNo">キャンセル</button>
      </div>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
